<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RogueSweeper</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="floating-bg" id="floating-bg"></div>
    <div class="screen-transition" id="screen-transition"></div>

    <div class="container">
        <!-- ── MENU ── -->
        <div class="menu-screen" id="menu-screen">

            <div class="title-section">
                <div class="title-block">
                    <h1 class="game-title">RogueSweeper</h1>
                    <p class="game-subtitle">MineSweeper Gone Rogue</p>
                </div>
                <button class="settings-icon-btn juicy-btn" id="settings-open-btn" title="Settings"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
            </div>

            <div class="level-section juicy-card" id="level-section">
                <div class="level-row">
                    <button class="upgrade-btn juicy-btn hidden" id="upgrade-btn">LEVEL UP</button>
                    <span class="level-label" id="level-label">LVL 0</span>
                    <div class="xp-bar-wrap">
                        <div class="xp-bar-fill" id="xp-bar-fill"></div>
                    </div>
                    <span class="xp-text" id="xp-text">0 / 10</span>
                </div>
            </div>

            <div class="difficulty-grid juicy-card" id="difficulty-grid">
                <div class="diff-box" id="diff-easy">
                    <div class="diff-icon-wrap easy-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="12,4 22,20 2,20"/></svg></div>
                    <span class="diff-name">Easy</span>
                </div>
                <div class="diff-box" id="diff-normal">
                    <div class="diff-icon-wrap normal-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3"/></svg></div>
                    <span class="diff-name">Normal</span>
                </div>
                <div class="diff-box diff-locked" id="diff-hard">
                    <div class="diff-icon-wrap hard-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="12,2 22,12 12,22 2,12"/></svg></div>
                    <span class="diff-name">Hard</span>
                </div>
                <div class="diff-box diff-soon" id="diff-cs1">
                    <div class="diff-icon-wrap soon-wrap">?</div>
                    <span class="diff-name">???</span>
                </div>
                <div class="diff-box diff-soon" id="diff-cs2">
                    <div class="diff-icon-wrap soon-wrap">?</div>
                    <span class="diff-name">???</span>
                </div>
                <div class="diff-box diff-soon" id="diff-cs3">
                    <div class="diff-icon-wrap soon-wrap">?</div>
                    <span class="diff-name">???</span>
                </div>
            </div>

            <div class="board-carousel-section juicy-card" id="board-carousel-section">
                <div class="carousel-header">
                    <span class="carousel-label">BOARDS</span>
                    <span class="carousel-counter" id="carousel-counter">1 / 8</span>
                </div>
                <div class="carousel-wrapper" id="carousel-wrapper">
                    <div class="carousel-slot slot-side slot-left"  id="slot-left"></div>
                    <div class="carousel-slot slot-center"          id="slot-center"></div>
                    <div class="carousel-slot slot-side slot-right" id="slot-right"></div>
                </div>
                <div class="carousel-dots" id="carousel-dots"></div>
            </div>

            <div class="counters-row juicy-card">
                <div class="counter-item">
                    <span class="counter-label">W</span>
                    <span class="counter-value" id="cols-value">—</span>
                </div>
                <div class="counter-divider"></div>
                <div class="counter-item">
                    <span class="counter-label">H</span>
                    <span class="counter-value" id="rows-value">—</span>
                </div>
                <div class="counter-divider"></div>
                <div class="counter-item">
                    <span class="counter-label">MINES</span>
                    <span class="counter-value" id="mines-value">—</span>
                </div>
            </div>

            <div class="play-row" id="play-row">
                <button class="play-btn   juicy-btn hidden" id="play-btn">START</button>
                <button class="continue-btn juicy-btn hidden" id="continue-btn">CONTINUE</button>
                <button class="abort-btn  juicy-btn hidden" id="abort-btn">ABORT</button>
            </div>

            <div class="extras-row">
                <button class="extra-btn juicy-btn" id="extra-btn">EXTRA</button>
                <button class="feats-btn juicy-btn" id="feats-btn">FEATS</button>
            </div>

        </div>

        <!-- ── GAME ── -->
        <div class="game-screen hidden" id="game-screen">
            <div class="header">
                <div class="stats-panel juicy-card">
                    <div class="stat">
                        <span class="stat-label">MINES</span>
                        <span class="stat-value" id="remaining">0</span>
                    </div>
                    <div class="stat board-stat">
                        <span class="stat-label">BOARD</span>
                        <span class="stat-value" id="board-indicator">1/8</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">TIME</span>
                        <span class="stat-value" id="time">000</span>
                    </div>
                </div>
                <div class="mode-toggle juicy-card">
                    <button class="mode-btn juicy-btn active" id="dig-btn">DIG</button>
                    <button class="mode-btn juicy-btn" id="flag-btn">FLG</button>
                </div>
            </div>
            <div class="zoom-container" id="zoom-container">
                <div class="board-wrapper" id="board-wrapper">
                    <div class="game-board" id="game-board"></div>
                </div>
            </div>
            <div class="game-controls">
                <button class="back-btn juicy-btn" id="back-btn">MENU</button>
                <div class="zoom-controls juicy-card">
                    <button class="zoom-btn juicy-btn" id="zoom-out">-</button>
                    <span class="zoom-level" id="zoom-level">100%</span>
                    <button class="zoom-btn juicy-btn" id="zoom-in">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over / Run Over Modal -->
    <div class="modal-overlay" id="game-over-modal">
        <div class="modal-content juicy-card">
            <button class="modal-hide-btn juicy-btn" id="modal-hide-btn" title="Hide"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <h2 id="modal-title">Run Over</h2>
            <p id="modal-message"></p>
            <p class="points-earned" id="points-earned"></p>
            <div class="modal-buttons">
                <button class="restart-btn juicy-btn" id="restart-btn">New Run</button>
                <button class="menu-link-btn juicy-btn" id="menu-btn">Menu</button>
            </div>
        </div>
    </div>
    <button class="modal-restore-btn juicy-btn hidden" id="modal-restore-btn"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 2v20M6 2h11l-3.5 5L17 12H6"/></svg></button>

    <!-- Board Finished Modal -->
    <div class="modal-overlay" id="board-finished-modal">
        <div class="modal-content juicy-card">
            <h2 id="bf-title">Board Complete!</h2>
            <p id="bf-message"></p>
            <p class="points-earned" id="bf-points"></p>
            <div class="modal-buttons">
                <button class="confirm-btn juicy-btn" id="bf-continue-btn">Continue</button>
                <button class="menu-link-btn juicy-btn" id="bf-menu-btn">Menu</button>
            </div>
        </div>
    </div>

    <!-- Generic (Difficulty / Unlock / Shop) Modal -->
    <div class="modal-overlay" id="diff-modal">
        <div class="modal-content juicy-card">
            <h2 id="diff-modal-title"></h2>
            <p id="diff-modal-body"></p>
            <div class="modal-buttons" id="diff-modal-buttons"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content juicy-card">
            <h2>Settings</h2>
            <div class="settings-row">
                <span class="toggle-label">Dark Mode</span>
                <label class="switch">
                    <input type="checkbox" id="dark-mode-toggle">
                    <span class="switch-slider"></span>
                </label>
            </div>
            <button class="close-settings-btn juicy-btn" id="settings-close-btn">Done</button>
        </div>
    </div>

    <script src="/static/game.js"></script>
</body>
</html>
