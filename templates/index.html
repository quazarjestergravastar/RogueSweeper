<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minesweeper</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="floating-bg" id="floating-bg"></div>
    <div class="screen-transition" id="screen-transition"></div>

    <div class="container">
        <div class="menu-screen" id="menu-screen">
            <div class="menu-top">
                <h1 class="game-title">MINESWEEPER</h1>
                <button class="settings-icon-btn juicy-btn" id="settings-open-btn" title="Settings">&#9881;</button>
            </div>

            <div class="level-section juicy-card" id="level-section">
                <div class="level-row">
                    <button class="upgrade-btn juicy-btn hidden" id="upgrade-btn">LEVEL UP</button>
                    <span class="level-label" id="level-label">LVL 0</span>
                    <div class="xp-bar-wrap">
                        <div class="xp-bar-fill" id="xp-bar-fill"></div>
                    </div>
                    <span class="xp-text" id="xp-text">0 / 10</span>
                </div>
            </div>

            <div class="menu-options">
                <div class="difficulty-grid juicy-card">
                    <div class="diff-box" id="diff-easy">
                        <div class="diff-icon-wrap easy-wrap">&#9650;</div>
                        <span class="diff-name">Easy</span>
                    </div>
                    <div class="diff-box" id="diff-normal">
                        <div class="diff-icon-wrap normal-wrap">&#9632;</div>
                        <span class="diff-name">Normal</span>
                    </div>
                    <div class="diff-box diff-locked" id="diff-hard">
                        <div class="diff-icon-wrap hard-wrap">&#9670;</div>
                        <span class="diff-name">Hard</span>
                    </div>
                    <div class="diff-box diff-soon" id="diff-cs1">
                        <div class="diff-icon-wrap soon-wrap">?</div>
                        <span class="diff-name">???</span>
                    </div>
                    <div class="diff-box diff-soon" id="diff-cs2">
                        <div class="diff-icon-wrap soon-wrap">?</div>
                        <span class="diff-name">???</span>
                    </div>
                    <div class="diff-box diff-soon" id="diff-cs3">
                        <div class="diff-icon-wrap soon-wrap">?</div>
                        <span class="diff-name">???</span>
                    </div>
                </div>

                <div class="counters-row juicy-card">
                    <div class="counter-item">
                        <span class="counter-label">W</span>
                        <span class="counter-value" id="cols-value">—</span>
                    </div>
                    <div class="counter-divider"></div>
                    <div class="counter-item">
                        <span class="counter-label">H</span>
                        <span class="counter-value" id="rows-value">—</span>
                    </div>
                    <div class="counter-divider"></div>
                    <div class="counter-item">
                        <span class="counter-label">MINES</span>
                        <span class="counter-value" id="mines-value">—</span>
                    </div>
                </div>

                <div class="play-row">
                    <button class="play-btn juicy-btn hidden" id="play-btn">NEW GAME</button>
                    <button class="continue-btn juicy-btn hidden" id="continue-btn">CONTINUE</button>
                </div>

                <button class="shop-btn juicy-btn" id="shop-btn">SHOP</button>
            </div>
        </div>

        <div class="game-screen hidden" id="game-screen">
            <div class="header">
                <div class="stats-panel juicy-card">
                    <div class="stat">
                        <span class="stat-label">MINES LEFT</span>
                        <span class="stat-value" id="remaining">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">TIME</span>
                        <span class="stat-value" id="time">000</span>
                    </div>
                </div>
                <div class="mode-toggle juicy-card">
                    <button class="mode-btn juicy-btn active" id="dig-btn">DIG</button>
                    <button class="mode-btn juicy-btn" id="flag-btn">FLG</button>
                </div>
            </div>
            <div class="zoom-container" id="zoom-container">
                <div class="board-wrapper" id="board-wrapper">
                    <div class="game-board" id="game-board"></div>
                </div>
            </div>
            <div class="game-controls">
                <button class="back-btn juicy-btn" id="back-btn">MENU</button>
                <div class="zoom-controls juicy-card">
                    <button class="zoom-btn juicy-btn" id="zoom-out">-</button>
                    <span class="zoom-level" id="zoom-level">100%</span>
                    <button class="zoom-btn juicy-btn" id="zoom-in">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div class="modal-overlay" id="game-over-modal">
        <div class="modal-content juicy-card">
            <button class="modal-hide-btn juicy-btn" id="modal-hide-btn" title="Hide">&#8722;</button>
            <h2 id="modal-title">Game Over</h2>
            <p id="modal-message"></p>
            <p class="points-earned" id="points-earned"></p>
            <div class="modal-buttons">
                <button class="restart-btn juicy-btn" id="restart-btn">Play Again</button>
                <button class="menu-link-btn juicy-btn" id="menu-btn">Menu</button>
            </div>
        </div>
    </div>
    <button class="modal-restore-btn juicy-btn hidden" id="modal-restore-btn">&#9873;</button>

    <!-- Difficulty / Unlock / Shop Modal -->
    <div class="modal-overlay" id="diff-modal">
        <div class="modal-content juicy-card">
            <h2 id="diff-modal-title"></h2>
            <p id="diff-modal-body"></p>
            <div class="modal-buttons" id="diff-modal-buttons"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content juicy-card">
            <h2>Settings</h2>
            <div class="settings-row">
                <span class="toggle-label">Dark Mode</span>
                <label class="switch">
                    <input type="checkbox" id="dark-mode-toggle">
                    <span class="switch-slider"></span>
                </label>
            </div>
            <button class="close-settings-btn juicy-btn" id="settings-close-btn">Done</button>
        </div>
    </div>

    <script src="/static/game.js"></script>
</body>
</html>
