<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minesweeper</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="menu-screen" id="menu-screen">
            <h1 class="game-title">MINESWEEPER</h1>
            <div class="menu-options">
                <div class="slider-group">
                    <label class="slider-label">
                        <span>WIDTH</span>
                        <span class="slider-value" id="width-value">10</span>
                    </label>
                    <input type="range" class="slider" id="width-slider" min="5" max="15" value="10">
                </div>
                <div class="slider-group">
                    <label class="slider-label">
                        <span>HEIGHT</span>
                        <span class="slider-value" id="height-value">16</span>
                    </label>
                    <input type="range" class="slider" id="height-slider" min="8" max="25" value="16">
                </div>
                <div class="mines-display">
                    <span class="mines-label">MINES</span>
                    <span class="mines-value" id="mines-value">24</span>
                </div>
                <button class="play-btn" id="play-btn">PLAY</button>
                <div class="settings-section">
                    <div class="dark-mode-toggle">
                        <span class="toggle-label">Dark Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="dark-mode-toggle">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <div class="game-screen hidden" id="game-screen">
            <div class="header">
                <div class="stats-panel">
                    <div class="stat">
                        <span class="stat-label">REMAINING</span>
                        <span class="stat-value" id="remaining">24</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">TIME</span>
                        <span class="stat-value" id="time">000</span>
                    </div>
                </div>
                <div class="mode-toggle">
                    <button class="mode-btn active" id="dig-btn">DIG</button>
                    <button class="mode-btn" id="flag-btn">FLG</button>
                </div>
            </div>
            <div class="zoom-container" id="zoom-container">
                <div class="game-board" id="game-board"></div>
            </div>
            <div class="game-controls">
                <button class="back-btn" id="back-btn">MENU</button>
                <div class="zoom-controls">
                    <button class="zoom-btn" id="zoom-out">-</button>
                    <span class="zoom-level" id="zoom-level">100%</span>
                    <button class="zoom-btn" id="zoom-in">+</button>
                </div>
            </div>
        </div>
        <div class="game-over-modal" id="game-over-modal">
            <div class="modal-content">
                <h2 id="modal-title">Game Over</h2>
                <p id="modal-message">You hit a mine!</p>
                <div class="modal-buttons">
                    <button class="restart-btn" id="restart-btn">Play Again</button>
                    <button class="menu-link-btn" id="menu-btn">Menu</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/game.js"></script>
</body>
</html>
